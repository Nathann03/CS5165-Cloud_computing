<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title else "Retail Analytics" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">CS5165 Final Project</p>
        <h1><a href="/">Retail Analytics Cloud Project</a></h1>
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/sample-household">Sample Pull</a>
        <a href="/search">Search</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/ml">ML</a>
        <a href="/admin">Reload Data</a>
        {% if request.session.get("demo_user") %}
        <form method="post" action="/logout" class="inline-form">
          <button type="submit" class="nav-button">Logout</button>
        </form>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
